name: CI/CD — Mini Data Platform

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: richard-sarfo/mini-data-platform

jobs:
  # Lint & Validate Code 
  lint:
    name: Lint & Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linting tools
        run: pip install flake8 'black==25.11.0' 'isort==6.1.0'

      - name: Run Black (formatting check)
        run: black --check scripts/ airflow/dags/

      - name: Run isort (import sorting check)
        run: isort --check-only scripts/ airflow/dags/

      - name: Run Flake8 (style check)
        run: flake8 scripts/ airflow/dags/ --max-line-length=120 --ignore=E501,W503

      - name: Validate Docker Compose syntax
        run: docker compose config --quiet

  # Build Docker Images 
  build:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service:
          - name: airflow-custom
            context: .
            dockerfile: ./airflow/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.service.name }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service.name }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Integration Tests 
  integration-test:
    name: Integration Tests (Data Flow Validation)
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'
    env:
      DATA_DB_HOST: localhost
      DATA_DB_PORT: "5432"
      POSTGRES_USER: ${{ secrets.POSTGRES_USER || 'airflow' }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD || 'airflow' }}
      POSTGRES_DB: ${{ secrets.POSTGRES_DB || 'airflow' }}
      DATA_DB_NAME: ${{ secrets.DATA_DB_NAME || 'salesdb' }}
      DATA_DB_USER: ${{ secrets.DATA_DB_USER || 'datauser' }}
      DATA_DB_PASSWORD: ${{ secrets.DATA_DB_PASSWORD || 'datapassword' }}
      MINIO_ENDPOINT: localhost:9000
      MINIO_ACCESS_KEY: ${{ secrets.MINIO_ACCESS_KEY || 'minioadmin' }}
      MINIO_SECRET_KEY: ${{ secrets.MINIO_SECRET_KEY || 'minioadmin123' }}
      MINIO_BUCKET: sales-data
      MINIO_ROOT_USER: ${{ secrets.MINIO_ACCESS_KEY || 'minioadmin' }}
      MINIO_ROOT_PASSWORD: ${{ secrets.MINIO_SECRET_KEY || 'minioadmin123' }}
      AIRFLOW_WWW_USER: ${{ secrets.AIRFLOW_WWW_USER || 'admin' }}
      AIRFLOW_WWW_PASSWORD: ${{ secrets.AIRFLOW_WWW_PASSWORD || 'admin' }}
      AIRFLOW_URL: http://localhost:8080/health
      METABASE_URL: http://localhost:3000/api/health

    steps:
      - uses: actions/checkout@v4

      - name: Set AIRFLOW_UID
        run: echo "AIRFLOW_UID=$(id -u)" >> $GITHUB_ENV

      - name: Create Airflow directories
        run: |
          mkdir -p airflow/logs airflow/plugins airflow/config data/sample
          chmod -R 750 airflow/logs data/sample

      - name: Start platform services
        run: |
          docker compose up -d postgres
          echo "Waiting for PostgreSQL to be ready..."
          sleep 10
          for i in {1..30}; do
            if docker compose exec -T postgres pg_isready -U ${POSTGRES_USER:-airflow} > /dev/null 2>&1; then
              echo "PostgreSQL is ready!"
              break
            fi
            echo "Attempt $i/30: Waiting for postgres..."
            sleep 5
          done
          
          docker compose up -d minio
          echo "Waiting for MinIO..."
          sleep 10

      - name: Initialize MinIO buckets
        run: docker compose run --rm minio-init

      - name: Start Airflow
        run: |
          docker compose run --rm airflow-init
          docker compose up -d airflow-webserver airflow-scheduler
          echo "Waiting for Airflow to be ready..."
          timeout 120 bash -c 'until curl -sf http://localhost:8080/health; do sleep 5; done'

      - name: Start Metabase
        run: |
          docker compose up -d metabase
          echo "Waiting for Metabase..."
          timeout 180 bash -c 'until curl -sf http://localhost:3000/api/health; do sleep 10; done'

      - name: Set up Python for validation
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install validation dependencies
        run: pip install minio psycopg2-binary pandas python-dotenv

      - name: Generate sample data
        run: |
          python scripts/generate_data.py --rows 100 --files 1 --output-dir ./data/sample
          echo "Sample data generated:"
          ls -la data/sample/

      - name: Upload sample data to MinIO
        run: |
          python scripts/generate_data.py --rows 50 --files 1 --upload

      - name: Trigger Airflow DAG (Quick Test)
        continue-on-error: true
        run: |
          DAG_ID="sales_data_pipeline"
          AIRFLOW_CREDS="${AIRFLOW_WWW_USER}:${AIRFLOW_WWW_PASSWORD}"
          
          # Unpause the DAG explicitly before triggering
          docker compose exec -T airflow-scheduler airflow dags unpause "$DAG_ID" || true
          
          RUN_URL="http://localhost:8080/api/v1/dags/$DAG_ID/dagRuns"
          
          echo "Triggering DAG: $DAG_ID"
          RESPONSE=$(curl -s -X POST -H "Content-Type: application/json" -u "$AIRFLOW_CREDS" "$RUN_URL" -d '{"conf": {}}')
          DAG_RUN_ID=$(echo $RESPONSE | jq -r '.dag_run_id')
          
          if [ "$DAG_RUN_ID" == "null" ] || [ -z "$DAG_RUN_ID" ]; then
            echo "Failed to trigger DAG: $RESPONSE"
            exit 0
          fi
          echo "Triggered DAG run: $DAG_RUN_ID"
          
          # Quick poll - only wait 2 minutes max
          echo "Waiting for DAG run to start (max 2 minutes)..."
          STATE="queued"
          ATTEMPTS=0
          MAX_ATTEMPTS=8 # 8 * 15s = 2 minutes
          
          while [ "$STATE" != "success" ] && [ "$STATE" != "failed" ] && [ "$STATE" != "running" ]; do
            if [ $ATTEMPTS -ge $MAX_ATTEMPTS ]; then
              echo "DAG is still running - continuing pipeline (DAG will complete in background)"
              exit 0
            fi
            sleep 15
            STATE=$(curl -s -u "$AIRFLOW_CREDS" "$RUN_URL/$DAG_RUN_ID" | jq -r '.state')
            echo "Current state: $STATE (Attempt $((ATTEMPTS+1))/$MAX_ATTEMPTS)"
            ATTEMPTS=$((ATTEMPTS+1))
          done
          
          if [ "$STATE" == "success" ]; then
            echo "✓ DAG run completed successfully!"
          elif [ "$STATE" == "running" ]; then
            echo "DAG is running - continuing pipeline"
          else
            echo "DAG state: $STATE"
          fi

      - name: Run Data Flow Validation
        run: python scripts/validate_data_flow.py

      - name: Verify records in PostgreSQL
        continue-on-error: true
        run: |
          python - <<'EOF'
          import psycopg2, sys, os
          try:
              conn = psycopg2.connect(
                  host=os.environ['DATA_DB_HOST'], port=int(os.environ['DATA_DB_PORT']),
                  dbname=os.environ['DATA_DB_NAME'],
                  user=os.environ['DATA_DB_USER'], password=os.environ['DATA_DB_PASSWORD']
              )
              with conn.cursor() as cur:
                  cur.execute("SELECT COUNT(*) FROM sales_transactions")
                  count = cur.fetchone()[0]
                  print(f"✓ Records in PostgreSQL: {count}")
                  if count == 0:
                      print("⚠ No records found (DAG may still be running)")
              conn.close()
          except Exception as e:
              print(f"⚠ Could not verify records: {e}")
          EOF

      - name: Collect logs on failure
        if: failure()
        run: |
          echo "=== PostgreSQL logs ==="
          docker compose logs postgres 2>&1 | tail -100
          echo "=== Airflow Webserver logs ==="
          docker compose logs airflow-webserver 2>&1 | tail -50
          echo "=== Airflow Scheduler logs ==="
          docker compose logs airflow-scheduler 2>&1 | tail -50

      - name: Cleanup
        if: always()
        run: docker compose down -v

  # Deploy to Test Environment 
  deploy-test:
    name: Deploy to Test Environment
    runs-on: ubuntu-latest
    needs: integration-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: test

    steps:
      - uses: actions/checkout@v4

      - name: Deploy notification
        run: |
          echo " Deploying Mini Data Platform to test environment"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"

      - name: Deploy via SSH
        env:
          TEST_SERVER_HOST: ${{ secrets.TEST_SERVER_HOST }}
          TEST_SERVER_USER: ${{ secrets.TEST_SERVER_USER }}
          TEST_SERVER_SSH_KEY: ${{ secrets.TEST_SERVER_SSH_KEY }}
        run: |
          if [ -z "$TEST_SERVER_HOST" ] || [ -z "$TEST_SERVER_SSH_KEY" ]; then
            echo "TEST_SERVER_HOST or TEST_SERVER_SSH_KEY not configured — skipping SSH deploy."
            exit 0
          fi
          echo "$TEST_SERVER_SSH_KEY" > /tmp/ssh_key
          chmod 600 /tmp/ssh_key
          ssh -i /tmp/ssh_key -o StrictHostKeyChecking=no \
            "$TEST_SERVER_USER@$TEST_SERVER_HOST" \
            'cd /opt/mini-data-platform && git pull origin main && docker-compose pull && docker-compose up -d && python scripts/validate_data_flow.py'
          rm -f /tmp/ssh_key

      - name: Deployment complete
        run: |
          echo "Deployment step finished!"
          echo "Services:"
          echo "  - Airflow:  http://${{ secrets.TEST_SERVER_HOST }}:8080"
          echo "  - MinIO:    http://${{ secrets.TEST_SERVER_HOST }}:9001"
          echo "  - Metabase: http://${{ secrets.TEST_SERVER_HOST }}:3000"
